<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Profile | JobConnect</title>
		<style>
			body {
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			}
			.blank {
				flex-grow: 2;
			}
			.nav {
				margin-top: 60px;
				margin-left: 70px;
				margin-right: 70px;
				margin-bottom: 75px;
				display: flex;
				flex-direction: row;
				flex-wrap: nowrap;
				gap: 50px;
				justify-content: flex-start;
				align-items: center;
			}
			.logo {
				color: #0a1d37;
				font-size: x-large;
			}
			.buttons {
				display: grid;
				border: 2px solid rgba(0, 0, 0, 0.05);
				border-radius: 100px;
				width: 100px;
				height: 40px;
				place-items: center;
			}
			a {
				text-decoration: none;
			}
			a.nav-buttons {
				color: #0066ff;
			}
			a.reg {
				color: #f4f7fa;
			}
			a.nav-buttons:hover {
				color: #01398d;
			}
			a.reg:hover {
				color: #e0ebf7;
			}
			.buttons-reg {
				display: grid;
				border: 2px solid rgba(0, 0, 0, 0.05);
				border-radius: 100px;
				width: 100px;
				height: 40px;
				text-align: center;
				place-items: center;
				background-color: #0066ff;
			}
			.main {
				display: flex;
				justify-content: space-between;
				align-items: flex-start;
				margin: 50px 70px;
				gap: 60px;
			}
			.form-submission,
			.profile-section {
				flex: 1;
				background-color: #f4f7fa;
				padding: 30px;
				border-radius: 15px;
				border: 2px solid rgba(0, 0, 0, 0.05);
			}
			input::placeholder,
			textarea::placeholder {
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				color: rgba(0, 0, 0, 0.289);
				font-weight: 500;
			}
			.form-button {
				display: flex;
				gap: 20px;
			}
			#reset,
			#submit {
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				color: #f4f7fa;
				font-size: medium;
				border: 2px solid rgba(0, 0, 0, 0.05);
				border-radius: 100px;
				width: 100px;
				height: 40px;
				place-content: center;
				background-color: #0066ff;
			}
			#reset:hover,
			#submit:hover {
				color: #e0ebf7;
			}
			#reset:active,
			#submit:active {
				transform: scale(0.95);
			}
			.footer {
				display: flex;
				flex-direction: row;
				flex-wrap: nowrap;
				gap: 30px;
				justify-content: center;
				align-items: center;
				margin-top: 75px;
			}
			.footer-buttons {
				color: #0066ff;
			}
			a.footer-buttons:hover {
				color: #01398d;
			}
			.copyright {
				display: flex;
				padding-top: 25px;
				justify-content: center;
			}
			input:not([type="checkbox"]),
			select,
			textarea {
				width: 100%;
				padding: 10px 15px;
				border: 2px solid rgba(0, 0, 0, 0.1);
				border-radius: 8px;
				outline: none;
				font-size: 14px;
				transition: 0.3s ease;
				box-sizing: border-box;
			}
			input:not([type="checkbox"]):focus,
			select:focus,
			textarea:focus {
				border-color: #0066ff;
				box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
			}
		</style>
	</head>
	<body>
		<div class="nav">
			<div class="logo">JobConnect</div>
			<div class="blank"></div>
			<div class="buttons"><a class="nav-buttons" href="#">Find Jobs</a></div>
			<div class="buttons"><a class="nav-buttons" href="#">Companies</a></div>
			<div class="buttons">
				<a class="nav-buttons" href="../Experiment4/exp4.html">Post a Job</a>
			</div>
			<div class="buttons-reg"><a class="reg" href="#">Sign Up</a></div>
			<div class="buttons-reg"><a class="reg" href="#">Log In</a></div>
		</div>
		<div class="main">
			<div class="form-submission">
				<form id="jobForm">
					<label>Name</label>
					<input
						id="name"
						type="text"
						name="fname"
						placeholder="Name"
						required /><br /><br />
					<label>Email</label>
					<input
						id="email"
						type="email"
						name="femail"
						placeholder="Email"
						required /><br /><br />
					<label>Job title</label>
					<input
						id="title"
						type="text"
						name="ftitle"
						placeholder="Job title"
						required /><br /><br />
					<label>Preferred Location</label>
					<input
						id="location"
						type="text"
						name="flocation"
						placeholder="Location"
						required /><br /><br />
					<label>Experience</label>
					<select id="experience">
						<option value="" disabled>Select Experience</option>
						<option>Fresher (0-1 years)</option>
						<option>Junior (1-3 years)</option>
						<option>Mid-Level (3-5 years)</option>
						<option>Senior (5-8 years)</option>
						<option>Expert (8+ years)</option></select
					><br /><br />
					<label>Job type</label><br />
					<input
						type="checkbox"
						id="fulltime"
						name="jobtype"
						value="Full-time" />
					<label for="fulltime">Full-time</label><br />
					<input
						type="checkbox"
						id="parttime"
						name="jobtype"
						value="Part-time" />
					<label for="parttime">Part-time</label><br />
					<input type="checkbox" id="remote" name="jobtype" value="Remote" />
					<label for="remote">Remote</label><br /><br />
					<label>Skills</label><br />
					<textarea
						id="skills"
						rows="5"
						cols="30"
						name="fskill"
						placeholder="Enter your skills (comma separated)"></textarea
					><br /><br />
					<div class="form-button">
						<input id="submit" type="submit" value="Submit" />
						<input id="reset" type="reset" value="Reset" />
					</div>
				</form>
			</div>

			<div class="profile-section">
				<h2>User Profile</h2>
				<p id="displayName"></p>
				<p id="displayEmail"></p>
				<p id="displayJobTitle"></p>
				<p id="displayLocation"></p>
				<p id="displayExp"></p>
				<p id="displayType"></p>
				<p id="displaySkills"></p>
			</div>
		</div>
		<div class="footer">
			<div><a class="footer-buttons" href="#">About Us</a></div>
			<div><a class="footer-buttons" href="#">Contact</a></div>
			<div><a class="footer-buttons" href="#">Terms</a></div>
			<div><a class="footer-buttons" href="#">Privacy</a></div>
		</div>
		<div class="copyright">&copy; Copyright 2026 | JobConnect</div>

		<script>
			document
				.getElementById("jobForm")
				.addEventListener("submit", function (event) {
					event.preventDefault();

					let name = document.getElementById("name").value;
					let email = document.getElementById("email").value;
					let jobTitle = document.getElementById("title").value;
					let locations = document.getElementById("location").value;
					let locationArray = locations.split(",");
					locationArray = locationArray.map((loc) => loc.trim());
					let locationDisp = locationArray.join(", ");
					let exp = document.getElementById("experience").value;
					let selectedTypes = [];
					let checkboxes = document.querySelectorAll(
						'input[name="jobtype"]:checked',
					);
					checkboxes.forEach((checkbox) => {
						selectedTypes.push(checkbox.value);
					});
					let typesDisp = selectedTypes.join(", ");
					let skills = document.getElementById("skills").value;
					let skillarray = skills.split(",");
					skillarray = skillarray.map((loc) => loc.trim());
					let skillDisp = skillarray.join(", ");

					// Display on right side
					document.getElementById("displayName").innerHTML = "Name: " + name;
					document.getElementById("displayEmail").innerHTML = "Email: " + email;
					document.getElementById("displayJobTitle").innerHTML =
						"Job Title: " + jobTitle;
					document.getElementById("displayLocation").innerHTML =
						"Preferred Locations: " + locationDisp;
					document.getElementById("displayExp").innerHTML =
						"Experience: " + exp;
					document.getElementById("displayType").innerHTML =
						"Job Type: " + typesDisp;
					document.getElementById("displaySkills").innerHTML =
						"Skills: " + skillDisp;
				});
		</script>
	</body>
</html>
